name: Android APK Build

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pluto.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pluto-apk
          path: pluto.apk
          if-no-files-found: error

      - name: Create release tag
        id: tag
        run: echo "tag=build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Pluto APK - ${{ steps.tag.outputs.tag }}"
          body: |
            Auto-built from commit ${{ github.sha }}

            Download `pluto.apk` below and install on your Android device.
          files: pluto.apk
          make_latest: true
